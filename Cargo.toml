[package]
name    = "rs-NaneExchanger"
version = "1.0.0"
edition = "2021"

[lib]
name = "exchange_lib"
path = "lib/lib.rs"

[[bin]]
name = "NameExchanger"
path = "src/main.rs"

[dependencies]
winsafe = { version = "0.0.26", features = ["gui", "version"] }

[profile.release]
lto       = true
opt-level = "z"
strip     = true
